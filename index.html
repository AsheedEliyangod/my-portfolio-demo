<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asheed Eliyangod | Game Developer</title>

<link rel="stylesheet" href="main.css">

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial, Helvetica, sans-serif;
}

/* HERO */

.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

/* canvas scene */

#gameCanvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* hero text */

.hero-content{
position:relative;
z-index:2;
max-width:700px;
}

.hero h1{
font-size:60px;
letter-spacing:3px;
}

.hero span{
color:#38bdf8;
}

.hero p{
margin-top:15px;
color:#cbd5f5;
}

.hero-buttons{
margin-top:30px;
}

.btn{
padding:14px 30px;
background:#38bdf8;
border-radius:6px;
text-decoration:none;
color:black;
font-weight:bold;
margin-right:10px;
}

.btn-outline{
padding:14px 30px;
border:2px solid #38bdf8;
border-radius:6px;
text-decoration:none;
color:white;
}

</style>

</head>

<body>

<section class="hero">

<canvas id="gameCanvas"></canvas>

<div class="hero-content">

<h1>GAME <span>DEVELOPER</span></h1>

<p>Creating immersive gameplay systems with Unreal Engine.</p>

<div class="hero-buttons">

<a href="#projects" class="btn">VIEW PROJECTS</a>
<a href="#contact" class="btn-outline">CONTACT</a>

</div>

</div>

</section>

<script>

/* canvas setup */

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* background layers */

let hills = [];

for(let i=0;i<6;i++){
hills.push({
x:i*300,
y:canvas.height-250,
w:300,
h:120
});
}

/* player */

let player = {
x:200,
y:canvas.height-150,
w:40,
h:60
};

/* animation */

function drawScene(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* sky gradient */

let gradient = ctx.createLinearGradient(0,0,0,canvas.height);
gradient.addColorStop(0,"#020617");
gradient.addColorStop(1,"#0f172a");

ctx.fillStyle = gradient;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* hills */

ctx.fillStyle="#1e293b";

hills.forEach(h=>{

ctx.fillRect(h.x,h.y,h.w,h.h);

h.x -= 0.3;

if(h.x < -300){
h.x = canvas.width;
}

});

/* ground */

ctx.fillStyle="#111827";
ctx.fillRect(0,canvas.height-80,canvas.width,80);

/* player */

ctx.fillStyle="#38bdf8";
ctx.fillRect(player.x,player.y,player.w,player.h);

requestAnimationFrame(drawScene);

}

drawScene();

</script>

</body>
