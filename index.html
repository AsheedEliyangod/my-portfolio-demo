.typewriter{

<script>

const texts=[
"I am a Game Developer.",
"I build Interactive Experiences.",
"I develop Websites."
];

let index=0;
let charIndex=0;

const typingSpeed=70;
const eraseSpeed=40;
const delay=1500;

const textElement=document.getElementById("dynamic-text");

function type(){

if(charIndex<texts[index].length){

textElement.textContent+=texts[index].charAt(charIndex);
charIndex++;
setTimeout(type,typingSpeed);

}else{

setTimeout(erase,delay);

}

}

function erase(){

if(charIndex>0){

textElement.textContent=texts[index].substring(0,charIndex-1);
charIndex--;
setTimeout(erase,eraseSpeed);

}else{

index++;

if(index>=texts.length) index=0;

setTimeout(type,typingSpeed+200);

}

}

document.addEventListener("DOMContentLoaded",function(){

if(texts.length) setTimeout(type,500);

});

</script>
