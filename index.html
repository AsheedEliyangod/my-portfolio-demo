<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asheed Eliyangod | Game Developer</title>

<link rel="stylesheet" href="main.css">

</head>

<body>

<header>

<h1 class="logo">ASHEED</h1>

<nav>
<a href="#projects">Projects</a>
<a href="#skills">Skills</a>
<a href="#contact">Contact</a>
</nav>

</header>

<section class="hero">

<canvas id="gameCanvas"></canvas>

<div class="hero-content">

<h1>GAME <span>DEVELOPER</span></h1>

<p>Creating immersive gameplay systems with Unreal Engine.</p>

<div class="hero-buttons">

<a href="#projects" class="btn">VIEW PROJECTS</a>
<a href="#contact" class="btn-outline">CONTACT</a>

</div>

</div>

</section>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* load sprite */

const playerSprite = new Image();
playerSprite.src = "images/player-walk.png";

/* clouds */

let clouds = [];

for(let i=0;i<5;i++){
clouds.push({
x:Math.random()*canvas.width,
y:Math.random()*200,
speed:0.2 + Math.random()*0.3
});
}

/* mountains */

let mountains = [];

for(let i=0;i<4;i++){
mountains.push({
x:i*400,
y:canvas.height-350,
w:400,
h:200
});
}

/* trees */

let trees=[];

for(let i=0;i<6;i++){
trees.push({
x:i*300,
y:canvas.height-200
});
}

/* player animation */

let frame=0;
let frameCount=6;

let player={
x:200,
y:canvas.height-180,
w:72,
h:72
};

/* draw loop */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* sky */

let gradient = ctx.createLinearGradient(0,0,0,canvas.height);
gradient.addColorStop(0,"#020617");
gradient.addColorStop(1,"#0f172a");

ctx.fillStyle=gradient;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* clouds */

ctx.fillStyle="#1e293b";

clouds.forEach(c=>{
ctx.beginPath();
ctx.arc(c.x,c.y,30,0,Math.PI*2);
ctx.fill();

c.x-=c.speed;

if(c.x<-50){
c.x=canvas.width+50;
}
});

/* mountains */

ctx.fillStyle="#111827";

mountains.forEach(m=>{

ctx.beginPath();

ctx.moveTo(m.x,m.y+m.h);
ctx.lineTo(m.x+m.w/2,m.y);
ctx.lineTo(m.x+m.w,m.y+m.h);

ctx.fill();

m.x-=0.2;

if(m.x<-400){
m.x=canvas.width;
}

});

/* trees */

ctx.fillStyle="#1e293b";

trees.forEach(t=>{

ctx.fillRect(t.x,t.y,20,80);

ctx.beginPath();
ctx.arc(t.x+10,t.y,40,0,Math.PI*2);
ctx.fill();

t.x-=0.8;

if(t.x<-50){
t.x=canvas.width;
}

});

/* ground */

ctx.fillStyle="#020617";
ctx.fillRect(0,canvas.height-100,canvas.width,100);

/* player sprite */

ctx.drawImage(
playerSprite,
frame*72,
0,
72,
72,
player.x,
player.y,
player.w,
player.h
);

frame++;

if(frame>=frameCount){
frame=0;
}

requestAnimationFrame(draw);

}

setInterval(()=>{

frame++;

if(frame>=frameCount){
frame=0;
}

},120);

draw();

</script>

</body>

</html>
